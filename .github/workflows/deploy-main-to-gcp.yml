name: deploy-main-to-gcp.yml

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # safer than StrictHostKeyChecking=no
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          
      - name: Deploy over SSH
        shell: bash
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          APP_DIR:  ${{ vars.APP_DIR }}
          PM2_NAME: ${{ vars.PM2_NAME }}
          REPO_URL: https://github.com/jaxn-harvey/team-app.git
        run: |
          ssh -i ~/.ssh/id_rsa -T "$SSH_USER@$SSH_HOST" <<EOF
            set -e
            
            APP_DIR="$APP_DIR"
            PM2_NAME="$PM2_NAME"
            REPO_URL="$REPO_URL"
            
            echo "Setting up deployment to \$APP_DIR..."
            mkdir -p "\$APP_DIR"
            
            # Check if repo already exists
            if [ -d "\$APP_DIR/.git" ]; then
              echo "Repository exists, pulling latest changes..."
              cd "\$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              echo "Cloning repository for first time..."
              git clone "\$REPO_URL" "\$APP_DIR"
              cd "\$APP_DIR"
              git checkout main
            fi
            
            echo "Installing dependencies..."
            sudo npm ci --production
            
            echo "Stopping existing PM2 process..."
            pm2 delete "\$PM2_NAME" || true
            
            echo "Starting PM2 process..."
            pm2 start -f app.mjs --name "\$PM2_NAME"
            pm2 save
            
            echo "Deployment complete!"
          EOF
