name: deploy-main-to-gcp.yml

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # safer than StrictHostKeyChecking=no
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          
      - name: Deploy over SSH
        shell: bash
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          APP_DIR:  ${{ vars.APP_DIR }}
          PM2_NAME: ${{ vars.PM2_NAME }}
        run: |
          ssh -i ~/.ssh/id_rsa -T "$SSH_USER@$SSH_HOST" <<'EOF'
            set -e
            
            echo "Deploying to $APP_DIR..."
            cd "$APP_DIR" || { echo "Failed to cd to $APP_DIR"; exit 1; }
            
            echo "Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main
            
            echo "Installing dependencies..."
            sudo npm ci --production
            
            echo "Restarting PM2 process..."
            pm2 delete "$PM2_NAME" || true
            pm2 start -f app.mjs --name "$PM2_NAME"
            
            echo "Saving PM2 state..."
            pm2 save
            
            echo "Deployment complete!"
          EOF
