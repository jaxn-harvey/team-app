<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .admin-wrapper {
      padding: 40px 20px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .admin-header h1 {
      color: var(--primary-color);
    }

    .logout-btn {
      background: var(--error-color);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    .form-card {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .form-card input {
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
    }

    .form-card button {
      margin-top: 15px;
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    .restaurant-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .restaurant-item {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 15px;
    }

    .restaurant-item h3 {
      margin-bottom: 5px;
      color: var(--primary-color);
    }

    .delete-btn {
      background: var(--error-color);
      color: white;
      border: none;
      padding: 6px 12px;
      margin-top: 10px;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="admin-wrapper">
    
    <div class="admin-header">
      <h1>Admin Dashboard</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- CREATE FORM -->
    <div class="form-card">
      <h2>Add Restaurant</h2>

      <form id="createForm">
        <div class="form-grid">
          <input type="text" id="name" placeholder="Name" required>
          <input type="text" id="cuisine" placeholder="Cuisine" required>
          <input type="text" id="address" placeholder="Address" required>
          <input type="text" id="phone" placeholder="Phone">
          <input type="text" id="hours" placeholder="Hours">
          <input type="number" id="rating" placeholder="Rating">
          <input type="number" id="reviews" placeholder="Reviews">
          <input type="text" id="image" placeholder="Image URL">
          <input type="text" id="lat" placeholder="Latitude">
          <input type="text" id="lng" placeholder="Longitude">
        </div>

        <input type="text" id="description" placeholder="Description" style="width:100%; margin-top:10px;">

        <button type="submit">Create Restaurant</button>
      </form>
    </div>

    <!-- LIST -->
    <div class="restaurant-list" id="restaurantList"></div>

  </div>

  <script src="js/admin-dashboard.js"></script>
</body>
</html>
