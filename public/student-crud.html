<!DOCTYPE html>
<!--
    🎓 EDUCATIONAL PURPOSE: JWT Authentication Demo
    
    This page demonstrates:
    1. How to check for JWT tokens in localStorage
    2. How to send tokens in Authorization headers  
    3. How protected routes respond to authenticated/unauthenticated requests
    4. Client-side token management and logout functionality
    
    Key Learning Points:
    - All CRUD operations require valid authentication
    - Tokens are sent as "Bearer <token>" in Authorization header
    - Frontend checks authentication status before showing content
    - Users can be logged out by removing the token from localStorage
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student CRUD App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/student-crud.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">📚 Protected Student Management Demo</h1>
        <div class="text-center mb-4">
            <a href="auth.html" class="btn btn-info">🔐 Authentication Demo</a>
        </div>
        
        <!-- Authentication Status -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card border-info">
                    <div class="card-body text-center">
                        <div id="authStatus">
                            <p class="text-muted">Checking authentication...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content (hidden until authenticated) -->
        <div id="mainContent" style="display: none;">
            <!-- Database Management Section -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="card bg-light">
                        <div class="card-body text-center">
                            <h5 class="card-title">🛠️ Database Management</h5>
                            <button class="btn btn-success me-2" onclick="seedDatabase()">🌱 Seed Database</button>
                            <button class="btn btn-danger" onclick="cleanupDatabase()">🧹 Cleanup Database</button>
                        </div>
                    </div>
                </div>
            </div>

        <!-- Add Student Form -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>➕ Add New Student</h5>
                    </div>
                    <div class="card-body">
                        <form id="addStudentForm">
                            <div class="mb-3">
                                <label for="name" class="form-label">Name</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>
                            <div class="mb-3">
                                <label for="age" class="form-label">Age</label>
                                <input type="number" class="form-control" id="age" required>
                            </div>
                            <div class="mb-3">
                                <label for="grade" class="form-label">Grade</label>
                                <input type="text" class="form-control" id="grade" placeholder="A, B+, C, etc." required>
                            </div>
                            <button type="submit" class="btn btn-primary">Add Student</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Update Student Form -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>✏️ Update Student</h5>
                    </div>
                    <div class="card-body">
                        <form id="updateStudentForm">
                            <div class="mb-3">
                                <label for="updateId" class="form-label">Student ID</label>
                                <input type="text" class="form-control" id="updateId" placeholder="Click on a student ID below" required>
                            </div>
                            <div class="mb-3">
                                <label for="updateName" class="form-label">Name</label>
                                <input type="text" class="form-control" id="updateName" required>
                            </div>
                            <div class="mb-3">
                                <label for="updateAge" class="form-label">Age</label>
                                <input type="number" class="form-control" id="updateAge" required>
                            </div>
                            <div class="mb-3">
                                <label for="updateGrade" class="form-label">Grade</label>
                                <input type="text" class="form-control" id="updateGrade" required>
                            </div>
                            <button type="submit" class="btn btn-warning">Update Student</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Students List -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5>👥 All Students</h5>
                        <button class="btn btn-info btn-sm" onclick="loadStudents()">🔄 Refresh</button>
                    </div>
                    <div class="card-body">
                        <div id="studentsList">
                            <p class="text-muted">Click "Refresh" to load students...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Messages -->
        <div id="messages" class="mt-3"></div>
        </div> <!-- End main content -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/student-crud.js"></script>
</body>
</html>
